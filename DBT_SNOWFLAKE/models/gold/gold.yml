models:

  - name: dim_customers
    description: The dim_customers model consolidates customer data from CRM and ERP systems to provide a unified and enriched customer view.

    columns:
      - name: customer_key
        description: Surrogate primary key uniquely identifying each customer.
        data_type: number
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: Business identifier of the customer from the CRM system.
        data_type: number
        data_tests:
          - unique
          - not_null

      - name: customer_number
        description: Customer number from the ERP system.
        data_type: varchar

      - name: first_name
        description: Customer's first name.
        data_type: varchar

      - name: last_name
        description: Customer's last name.
        data_type: varchar

      - name: country
        description: Country associated with the customer.
        data_type: varchar

      - name: marital_status
        description: Marital status of the customer.
        data_type: varchar

      - name: gender
        description: Gender of the customer enriched from CRM and ERP.
        data_type: varchar

      - name: birthdate
        description: Date of birth of the customer.
        data_type: date

      - name: create_date
        description: Record creation date in CRM.
        data_type: date


  - name: dim_products
    description: The dim_products model provides detailed product attributes enriched with category information.

    columns:
      - name: product_key
        description: Surrogate primary key uniquely identifying each product.
        data_type: number

      - name: product_id
        description: Business identifier of the product from CRM.
        data_type: number

      - name: product_number
        description: ERP product number.
        data_type: varchar

      - name: product_name
        description: Name of the product.
        data_type: varchar

      - name: category_id
        description: Identifier of the product category.
        data_type: varchar

      - name: category
        description: Category name of the product.
        data_type: varchar

      - name: subcategory
        description: Subcategory classification of the product.
        data_type: varchar

      - name: maintenance
        description: Indicates whether the product requires maintenance.
        data_type: varchar

      - name: cost
        description: Production or acquisition cost of the product.
        data_type: number

      - name: product_line
        description: Product line classification.
        data_type: varchar

      - name: start_date
        description: Product activation date.
        data_type: date


  - name: fact_sales
    description: The fact_sales model captures transactional sales data enriched with customer and product dimensions.

    columns:
      - name: order_number
        description: Unique identifier of the sales order.
        data_type: varchar
        data_tests:
          - not_null

      - name: product_key
        description: Foreign key referencing dim_products.
        data_type: number

      - name: customer_key
        description: Foreign key referencing dim_customers.
        data_type: number
        data_tests:
          - not_null

      - name: order_date
        description: Date when the order was placed.
        data_type: date

      - name: shipping_date
        description: Date when the order was shipped.
        data_type: date

      - name: due_date
        description: Payment due date.
        data_type: date

      - name: sales_amount
        description: Total sales revenue of the order.
        data_type: number

      - name: quantity
        description: Quantity of products sold.
        data_type: number

      - name: price
        description: Unit price of the product.
        data_type: number